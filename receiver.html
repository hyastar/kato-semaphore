<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>信号接收端 - 通信调制识别系统</title>
    <!-- 引入Vue3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- 引入Element Plus CDN -->
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        .container {
            width: 800px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .prob-item {
            margin: 5px 0;
            width: 100%;
            word-wrap: break-word;
        }
        .result-card {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #e6e6e6;
            border-radius: 6px;
        }
        .prob-item {
            margin: 5px 0;
        }
        .el-form-item {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">📥 信号接收端</h2>
        <!-- 接收按钮 -->
        <el-form-item>
            <el-button type="primary" @click="receiveSignal" :loading="loading">接收并识别解调</el-button>
        </el-form-item>
        <!-- 结果显示区域 -->
        <div v-if="result" class="result-card">
            <el-alert 
                :title="result.message" 
                :type="result.status === 'success' ? 'success' : 'error'" 
                show-icon
                style="margin-bottom: 15px;"
            ></el-alert>
            
            <div v-if="result.status === 'success'">
                <!-- 解调文本显示 -->
                <el-form-item label="解调后文本：">
                    <el-input 
                        v-model="result.demodulated_text" 
                        type="textarea"
                        rows="3"
                        readonly
                        style="width: 600px;"
                    ></el-input>
                </el-form-item>
                
                <!-- 调制类型信息 -->
                <el-form-item label="调制类型识别：">
                    <div>
                        <p>✅ 实际调制类型：{{ formatModType(result.actual_modulation_type) }}</p>
                        <p>🔍 MLP识别类型：{{ formatModType(result.recognized_modulation_type) }}</p>
                    </div>
                </el-form-item>
                
                <!-- 识别概率 -->
                <el-form-item label="MLP识别概率：">
                    <div class="prob-item" v-for="(prob, modType) in result.recognition_probability" :key="modType">
                        <span v-if="modType === 'AM'">AM调幅：</span>
                        <span v-if="modType === '2FSK'">2FSK频移键控：</span>
                        <span v-if="modType === 'BPSK'">BPSK二进制相移键控：</span>
                        <span v-if="modType === 'QPSK'">QPSK四进制相移键控：</span>
                        <span v-if="modType === '16QAM'">16QAM正交振幅调制：</span>
                        {{ (prob * 100).toFixed(2) }}% <!-- 保留2位小数，提升精度 -->
                    </div>
                </el-form-item>
                
                <!-- 二进制流（可选） -->
                <el-form-item label="二进制流：">
                    <el-input 
                        v-model="result.binary_string" 
                        type="textarea"
                        rows="2"
                        readonly
                        style="width: 600px;"
                    ></el-input>
                </el-form-item>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            setup() {
                // 响应式数据
                const loading = Vue.ref(false)
                const result = Vue.ref(null)

                // 接收并解调函数
                const receiveSignal = async () => {
                    loading.value = true
                    result.value = null
                    try {
                        // 调用后端接口（接收端服务在5245端口）
                        const res = await fetch("http://127.0.0.1:5245/receive_and_demodulate")
                        const data = await res.json()
                        if (res.ok) {
                            result.value = data
                            ElementPlus.ElMessage.success("接收并识别解调成功！")
                        } else {
                            result.value = { status: "error", message: data.detail }
                            ElementPlus.ElMessage.error("接收失败！")
                        }
                    } catch (e) {
                        result.value = { status: "error", message: "网络异常：" + e.message }
                        ElementPlus.ElMessage.error("网络异常！")
                    } finally {
                        loading.value = false
                    }
                }

                // 新增：调制类型格式化函数
                const formatModType = (modType) => {
                    const modTypeMap = {
                        "AM": "AM调幅",
                        "2FSK": "2FSK频移键控",
                        "BPSK": "BPSK二进制相移键控",
                        "QPSK": "QPSK四进制相移键控",
                        "16QAM": "16QAM正交振幅调制"
                    };
                    return modTypeMap[modType] || modType;
                };

                return {
                    loading,
                    result,
                    receiveSignal,
                    formatModType // 新增导出
                }
            }
        }).use(ElementPlus).mount('#app')
    </script>
</body>
</html>
