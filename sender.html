<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>信号发送端 - 通信调制识别系统</title>
    <!-- 引入Vue3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- 引入Element Plus CDN -->
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        .container {
            width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .el-form-item {
            margin-bottom: 20px;
        }
        .success-tip {
            color: #67c23a;
            margin-top: 10px;
        }
        .error-tip {
            color: #f56c6c;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">📤 信号发送端</h2>
        <el-form label-width="100px">
            <!-- 文本输入框 -->
            <el-form-item label="输入文本：">
                <el-input 
                    v-model="inputText" 
                    placeholder="AM/2FSK/BPSK：任意文本；QPSK：二进制长度为2的倍数；16QAM：二进制长度为4的倍数"
                    type="textarea"
                    rows="3"
                    style="width: 400px;"
                ></el-input>
            </el-form-item>
            <!-- 调制类型选择 -->
            <el-form-item label="调制类型：">
                <el-select v-model="selectedModType" style="width: 300px;">
                    <el-option label="AM调幅" value="AM"></el-option>
                    <el-option label="2FSK频移键控" value="2FSK"></el-option>
                    <el-option label="BPSK二进制相移键控" value="BPSK"></el-option>
                    <el-option label="QPSK四进制相移键控" value="QPSK"></el-option>
                    <el-option label="16QAM正交振幅调制" value="16QAM"></el-option>
                </el-select>
            </el-form-item>
            <!-- 调制说明 -->
            <el-form-item label="调制说明：">
                <div style="color: #666; font-size: 12px;">
                    <p>• AM/2FSK/BPSK：无比特长度限制</p>
                    <p>• QPSK：文本转二进制后长度需为2的倍数（对应2bit符号）</p>
                    <p>• 16QAM：文本转二进制后长度需为4的倍数（对应4bit符号）</p>
                </div>
            </el-form-item>
            <!-- 发送按钮 -->
            <el-form-item>
                <el-button type="primary" @click="sendSignal" :loading="loading">发送信号</el-button>
            </el-form-item>
        </el-form>
        <!-- 结果提示 -->
        <div v-if="result" :class="result.status === 'success' ? 'success-tip' : 'error-tip'">
            {{ result.message }}
            <div v-if="result.status === 'success'">
                <p>二进制流：{{ result.binary_string }}</p>
                <p>调制类型：{{ result.modulation_type }}</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            setup() {
                // 响应式数据
                const inputText = Vue.ref("")
                const selectedModType = Vue.ref("2FSK")
                const loading = Vue.ref(false)
                const result = Vue.ref(null)

                // 文本转二进制辅助函数
                const textToBin = (text) => {
                    return text.split('').map(char => {
                        const bin = char.charCodeAt(0).toString(2);
                        return bin.padStart(8, '0'); // 单字符转8位二进制
                    }).join('');
                };

                // 发送信号函数
                const sendSignal = async () => {
                    if (!inputText.value) {
                        ElementPlus.ElMessage.warning("请输入要发送的文本！")
                        return
                    }
                    
                    // 调制类型专属输入校验
                    const binStr = textToBin(inputText.value);
                    if (selectedModType.value === "QPSK" && binStr.length % 2 !== 0) {
                        ElementPlus.ElMessage.warning("QPSK要求二进制长度为2的倍数，请调整输入文本！");
                        loading.value = false;
                        return;
                    }
                    if (selectedModType.value === "16QAM" && binStr.length % 4 !== 0) {
                        ElementPlus.ElMessage.warning("16QAM要求二进制长度为4的倍数，请调整输入文本！");
                        loading.value = false;
                        return;
                    }
                    
                    loading.value = true
                    result.value = null
                    try {
                        // 调用后端接口（发送端服务在8001端口）
                        const res = await fetch("http://127.0.0.1:8001/modulate_and_send", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                text: inputText.value,
                                mod_type: selectedModType.value
                            })
                        })
                        const data = await res.json()
                        if (res.ok) {
                            result.value = data
                            ElementPlus.ElMessage.success("发送成功！")
                        } else {
                            result.value = { status: "error", message: data.detail }
                            ElementPlus.ElMessage.error("发送失败！")
                        }
                    } catch (e) {
                        result.value = { status: "error", message: "网络异常：" + e.message }
                        ElementPlus.ElMessage.error("网络异常！")
                    } finally {
                        loading.value = false
                    }
                }

                return {
                    inputText,
                    selectedModType,
                    loading,
                    result,
                    sendSignal
                }
            }
        }).use(ElementPlus).mount('#app')
    </script>
</body>
</html>
